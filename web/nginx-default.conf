# nginx del self-host: NO cachear los .html (para que el browser agarre los ?v=N nuevos de los js/css).
# Los assets (js/css/img) van cache-busteados por ?v=N, así que pueden cachearse normal.
#
# HEADERS DE SEGURIDAD (specs/seguridad.md §4): el juego es estático (sin secretos), pero igual endurecemos el borde.
# Ojo nginx: `add_header` NO se hereda en un location que tiene SU PROPIO add_header → por eso los repetimos en los
# `location` de .html (que ya setean Cache-Control). El CSP está afinado a lo que el juego REALMENTE usa:
#   - script-src 'self'  → no hay scripts inline (GAME_METRICS se setea en telemetry.js, no en index.html)
#   - style-src 'unsafe-inline' → los overlays se arman con style="..." en runtime (innerHTML)
#   - connect-src → el proxy de IA + OpenRouter (BYOK) ; media-src → el TTS del proxy (<audio>)
server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # ---- headers de seguridad comunes (aplican al catch-all `location /`; se REPITEN en los location de .html) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://llm-tormenta-solar.cybercirujas.club https://openrouter.ai; media-src 'self' https://llm-tormenta-solar.cybercirujas.club; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # HTML (index + info/*) → siempre revalidar. Repetimos los headers de seguridad: este location declara add_header
    # (Cache-Control) y por eso NO hereda los de arriba (quirk de nginx).
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://llm-tormenta-solar.cybercirujas.club https://openrouter.ai; media-src 'self' https://llm-tormenta-solar.cybercirujas.club; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        try_files /index.html =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://llm-tormenta-solar.cybercirujas.club https://openrouter.ai; media-src 'self' https://llm-tormenta-solar.cybercirujas.club; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
