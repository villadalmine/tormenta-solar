# nginx del self-host: NO cachear los .html (para que el browser agarre los ?v=N nuevos de los js/css).
# Los assets (js/css/img) van cache-busteados por ?v=N, así que pueden cachearse normal.
server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # HTML (index + info/*) → siempre revalidar (si no, el browser sirve el HTML viejo con ?v= viejo)
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
