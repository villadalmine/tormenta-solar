{{- if .Values.gateway.tls.enabled }}
# Certificate público (Let's Encrypt vía el ClusterIssuer gateway.tls.issuer). cert-manager
# emite por DNS-01/acme-dns y rellena el Secret que monta el listener HTTPS del Gateway.
# Vive en el ns del Gateway (gateway.namespace), no en el del Service.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.tls.secretName | default (printf "%s-tls" .Release.Name) }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  secretName: {{ .Values.gateway.tls.secretName | default (printf "%s-tls" .Release.Name) }}
  dnsNames:
    - {{ .Values.gateway.host | quote }}
    {{- range .Values.gateway.extraHosts }}
    - {{ . | quote }}
    {{- end }}
  issuerRef:
    name: {{ .Values.gateway.tls.issuer }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
