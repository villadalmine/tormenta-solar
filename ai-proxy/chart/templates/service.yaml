apiVersion: v1
kind: Service
metadata:
  name: {{ include "tormenta-ai-proxy.fullname" . }}
  labels:
    {{- include "tormenta-ai-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tormenta-ai-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
