{{- if .Values.historias.enabled }}
# Argo CronWorkflow: la IA AUTORA el TEXTO de las historias de terror del VECINO de los edificios clausurados
# (gen-historias.mjs) y las publica en el proxy (POST /historias) → banco VIVO. El juego las prefiere sobre el
# banco estático (game.js). Ver specs/edificios-clausurados-historias.md §8. Reusa imagen del proxy + SA + GEN_TOKEN.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ include "tormenta-ai-proxy.fullname" . }}-historias
  labels:
    {{- include "tormenta-ai-proxy.labels" . | nindent 4 }}
spec:
  schedules:
    - {{ .Values.historias.schedule | default "45 4 * * *" | quote }}
  timezone: {{ .Values.historias.timezone | default "America/Argentina/Buenos_Aires" | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  workflowSpec:
    entrypoint: gen
    serviceAccountName: {{ include "tormenta-ai-proxy.fullname" . }}-pool
    activeDeadlineSeconds: 300
    ttlStrategy:
      secondsAfterCompletion: 86400
      secondsAfterSuccess: 43200
      secondsAfterFailure: 172800
    podGC:
      strategy: OnWorkflowCompletion
    {{- with .Values.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
    templates:
      - name: gen
        retryStrategy:
          limit: "3"
          retryPolicy: Always
          backoff: { duration: "20s", maxDuration: "2m" }
        container:
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "gen-historias.mjs"]
          env:
            - name: HIST_POST_URL
              value: "http://{{ include "tormenta-ai-proxy.fullname" . }}/historias"
            - name: GEN_TOKEN
              value: {{ .Values.linyeraPool.genToken | quote }}
            - name: HIST_MODEL
              value: {{ .Values.historias.model | default "gemma4-paid" | quote }}
            - name: HIST_PER
              value: {{ .Values.historias.per | default 4 | quote }}
            - name: AI_BASE_URL
              value: {{ .Values.upstream.baseUrl | quote }}
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tormenta-ai-proxy.secretName" . }}
                  key: {{ include "tormenta-ai-proxy.secretKey" . }}
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 200m, memory: 128Mi }
{{- end }}
