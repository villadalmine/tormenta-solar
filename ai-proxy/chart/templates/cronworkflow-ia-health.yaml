{{- if .Values.linyeraPool.cronjob.enabled }}
# Argo CronWorkflow cada 6h (specs/ia-costos.md §2): ¿CÓMO VIENE la IA? check-ia.mjs lee /metrics del proxy,
# calcula fallback%/timeouts/budget/gasto de la ventana y publica el reporte (POST /ia-report, GEN_TOKEN).
# El proxy expone gauges → PrometheusRule (prometheusrule-ia.yaml) → Alertmanager → Telegram. Corrido 30' del
# cron de precios para no pisarse. Patrón -precios (imagen del proxy, SA del pool).
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ include "tormenta-ai-proxy.fullname" . }}-ia-health
  labels:
    {{- include "tormenta-ai-proxy.labels" . | nindent 4 }}
spec:
  schedules:
    - "30 */6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  workflowSpec:
    entrypoint: gen
    serviceAccountName: {{ include "tormenta-ai-proxy.fullname" . }}-pool
    activeDeadlineSeconds: 300
    ttlStrategy:
      secondsAfterCompletion: 86400
      secondsAfterSuccess: 43200
      secondsAfterFailure: 172800
    podGC:
      strategy: OnWorkflowCompletion
    {{- with .Values.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
    templates:
      - name: gen
        retryStrategy:
          limit: "3"
          retryPolicy: Always
          backoff: { duration: "20s", maxDuration: "2m" }
        container:
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "check-ia.mjs"]
          env:
            - name: METRICS_URL
              value: "http://{{ include "tormenta-ai-proxy.fullname" . }}/metrics"
            - name: REPORTS_URL
              value: "http://{{ include "tormenta-ai-proxy.fullname" . }}/ia-reports"
            - name: REPORT_POST_URL
              value: "http://{{ include "tormenta-ai-proxy.fullname" . }}/ia-report"
            - name: GEN_TOKEN
              value: {{ .Values.linyeraPool.genToken | quote }}
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 200m, memory: 128Mi }
{{- end }}
