{{- if and .Values.noticias.enabled .Values.noticias.live }}
# Argo CronWorkflow "en vivo": corre gen-noticias.mjs en modo NEWS_LIVE_ONLY (solo Mundial/fútbol/crypto, sin Google
# News ni resumen IA) cada hora → POST /noticias con MERGE (no pisa el run diario) + POST /mundial. Ver cine-noticias §7.1.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ include "tormenta-ai-proxy.fullname" . }}-noticias-live
  labels:
    {{- include "tormenta-ai-proxy.labels" . | nindent 4 }}
spec:
  schedules:
    - {{ .Values.noticias.liveSchedule | default "0 * * * *" | quote }}
  timezone: {{ .Values.noticias.timezone | default "America/Argentina/Buenos_Aires" | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  workflowSpec:
    entrypoint: gen
    serviceAccountName: {{ include "tormenta-ai-proxy.fullname" . }}-pool
    activeDeadlineSeconds: 180
    ttlStrategy:
      secondsAfterCompletion: 14400
      secondsAfterSuccess: 3600
      secondsAfterFailure: 43200
    podGC:
      strategy: OnWorkflowCompletion
    {{- with .Values.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
    templates:
      - name: gen
        retryStrategy:
          limit: "2"
          retryPolicy: Always
          backoff: { duration: "15s", maxDuration: "1m" }
        container:
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "gen-noticias.mjs"]
          env:
            - name: NEWS_LIVE_ONLY          # solo lo que cambia rápido + POST con merge
              value: "1"
            - name: NEWS_POST_URL
              value: "http://{{ include "tormenta-ai-proxy.fullname" . }}/noticias"
            - name: GEN_TOKEN
              value: {{ .Values.linyeraPool.genToken | quote }}
            {{- with .Values.noticias.sports }}
            - name: NEWS_SPORTS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.noticias.worldcup }}
            - name: NEWS_WORLDCUP
              value: {{ . | quote }}
            {{- end }}
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 200m, memory: 128Mi }
{{- end }}
