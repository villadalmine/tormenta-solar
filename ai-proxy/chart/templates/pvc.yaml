{{- if .Values.persistence.enabled }}
# PVC para el store de suscripciones (código→key de OpenRouter, JSON). Bajo volumen.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tormenta-ai-proxy.fullname" . }}-data
  labels:
    {{- include "tormenta-ai-proxy.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | default "1Gi" }}
{{- end }}
