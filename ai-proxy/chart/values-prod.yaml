# values-prod.yaml — valores de PRODUCCIÓN del proxy (deploy-pipeline.md F1).
# Deploy SIEMPRE así (sin --reuse-values, que dropea defaults nuevos del chart y nos rompió toda la sesión):
#   helm upgrade tormenta-ai ai-proxy/chart -n ai -f ai-proxy/chart/values-prod.yaml \
#     --set image.tag=<TAG> --set linyeraPool.genToken=<TOKEN>
# (image.tag varía por deploy; genToken es secreto → NO se commitea, va por --set o un Secret más adelante.)
fullnameOverride: tormenta-ai-proxy

image:
  repository: registry.registry:5000/ai/tormenta-ai-proxy
  tag: ""                          # SIEMPRE pasar --set image.tag=<X> en el deploy
  pullPolicy: Always               # MISMO fix que la web (infra-29): el tag se reusa → IfNotPresent corría imagen vieja
                                   # cacheada en el nodo (endpoints nuevos daban 405/caían al chat). Always + rollout = pull fresco.

# key de LiteLLM (secret ya existente en el cluster)
auth:
  existingSecret: tormenta-ai-key
  existingSecretKey: apiKey

upstream:
  # cadena del chat: free primero (gemma4-free, $0 cuando hay cupo) → RED PAGA cuando el free se agota.
  # Red paga = gemma4-paid (gemelo EXACTO del free, rápido/no-reasoning, $0.47/1M, SIN límite diario) con
  # claude-sonnet de respaldo premium. cheap (deepseek-v4-flash) salió: era reasoning → lento 9s.
  model: gemma4-free,gemma4-paid,claude-sonnet

# timeouts (el pago tarda 5-7s → presupuesto más amplio) + cupo/día por sesión + tope DURO de gasto pago
extraEnv:
  - { name: UPSTREAM_TIMEOUT_MS, value: "10500" }   # presupuesto TOTAL (el cliente espera 11s)
  - { name: PER_MODEL_TIMEOUT_MS, value: "6000" }   # gemma4-paid ~1.5s, claude-sonnet ~5s → 6s alcanza y capea cuelgues (antes 9.5s era para 'cheap' lento)
  - { name: DAILY_CAP, value: "40" }                # chats/día por sesión (anti-DoS honesto)
  - { name: PAID_MODELS, value: "gemma4-paid,claude-sonnet,cheap,paid-final" }  # qué model_names cuestan plata
  - { name: PAID_DAILY_CAP, value: "600" }          # tope DURO: respuestas pagas/día (todos los users)
  # F2 ModelScorer (auto-pilot "más barato-bueno"): cruza disponibilidad+latencia+precio reales y arma la
  # cadena sola. CANDIDATES = pool free (varios, así si gemma4-free se satura, otro free responde) + el pago
  # entra solo como red (último). FLOOR = piso que nunca falta. CHAIN_MAX 3 = 2 free + 1 pago.
  # AUTOPILOT OFF (default): usa la cadena ESTÁTICA AI_MODEL = gemma4-free → gemma4-paid → claude-sonnet
  # (free PRIMERO, y el PAGO nuestro asegurado como red). Con AUTOPILOT=1 metía 2+ free adelante y con
  # PER_MODEL 6s / budget 10.5s NUNCA llegaba al pago → el anónimo caía a fallback. Ver specs/ia-tiers.md.
  - { name: AUTOPILOT, value: "0" }
  - { name: CANDIDATES, value: "gemma4-free,gpt-oss-free,llama70b-free,kimi-free,gemma4-paid,claude-sonnet" }
  - { name: FLOOR_MODEL, value: "gemma4-free" }
  - { name: CHAIN_MAX, value: "4" }                 # 2 free + gemma4-paid + claude-sonnet (respaldo)
  - { name: PAID_IN_CHAIN, value: "2" }             # gemma4-paid (barato) primero, claude-sonnet de respaldo
  # Suscripción (suscripcion.md §9 F1): un código válido → cadena paga directa (salta free+cupo). Los CÓDIGOS
  # son SECRETOS → NO se commitean: van por --set 'extraEnv...' al deploy, o por POST /sub-codes (GEN_TOKEN).
  - { name: SUB_MODELS, value: "gemma4-paid,claude-sonnet" }
  # F3 (key-por-código): el sub provisionado va DIRECTO a OpenRouter con su key → estos son ids de OpenRouter
  - { name: SUB_OR_MODELS, value: "google/gemma-4-31b-it,anthropic/claude-sonnet-4.5" }
  - { name: SUB_LIMIT_USD, value: "1" }             # budget por key (tope US$1/usuario) al provisionar
  - { name: SUB_TTL_DAYS, value: "30" }             # la suscripción vence en 1 mes

# suscripción F3: provisioning key de OpenRouter (Secret ya creado a mano; NO commitear el valor)
provisioning:
  existingSecret: tormenta-or-provisioning
  existingSecretKey: provisioningKey

# PVC para el store código→key (JSON). Longhorn en rk1.
persistence:
  enabled: true
  mountPath: /data
  storageClass: longhorn-nvme
  size: 1Gi

# expone el proxy por el cluster-gateway compartido (SNI passthrough desde el G4) con TLS LE prod
gateway:
  enabled: true
  ensureListener:
    enabled: true
  host: llm-tormenta-solar.cybercirujas.club
  tls:
    enabled: true
    issuer: letsencrypt-prod

# métricas → Prometheus (label release para que lo scrapee kube-prometheus-stack) + dashboards Grafana
metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
    labels:
      release: kube-prometheus-stack
  grafanaDashboard:
    enabled: true

# crons Argo: pool del linyera (1×/día) + precios OpenRouter (cada 6h). genToken va por --set/secret.
# CINE de noticias: cron 1×/día (9am AR) que llena /noticias (Google News, sin key) + "captura IA" fiel del
# titular con gemma4-paid (validado: GPU inventa datos, NPU caída). El answer queda crudo (para verificación).
noticias:
  enabled: true
  schedule: "0 5,9,23 * * *"   # 3×/día: 5am, 9am y 23h (AR). Refresca el Mundial/Villa Dálmine varias veces.
  summarizeModel: gemma4-paid
  # fútbol con RESULTADO EXACTO (TheSportsDB, key de prueba): pisa el topic con un score numérico ("2-1").
  # mundial=FIFA World Cup (liga 4429, en juego jun-2026) · primera-b=VILLA DÁLMINE por EQUIPO (team:137785,
  # su último partido sin importar la liga). IDs verificados 2026-06-25.
  sports: "mundial:4429,primera-b:team:137785"
  # Mundial: tabla del grupo de Argentina + goleadores, vía ESPN (sin key). Topics: mundial-tabla, mundial-goleadores.
  worldcup: "fifa.world"
  # refresh EN VIVO (cron horario, modo live-only: Mundial/fútbol/crypto con MERGE, sin Google News ni IA).
  live: true
  liveSchedule: "0 * * * *"

# CINE: carteles de propaganda FALSOS estilo BsAs por rubro (comida/ropa/electronica/bizarro), generados por IA.
# El modelo SÍ inventa (es el punto). 1×/día. El juego los rota en los carteles del cine (GET /propaganda).
propaganda:
  enabled: true
  schedule: "0 4 * * *"
  model: gemma4-paid

# CINE/NPCs vivos: frases de chusmerío ambiente generadas por IA (gen-chusmerio.mjs). El modelo SÍ inventa.
chusmerio:
  enabled: true
  schedule: "30 4 * * *"
  model: gemma4-paid

# CARTELES (C2): la IA del salón deja carteles cortos en el Tablón (cupo 30%/piso). construccion-colaborativa.md.
carteles:
  enabled: true
  schedule: "15 */6 * * *"   # cada 6h
  model: gemma4-paid

# VECINO: banco VIVO de historias de terror por edificio clausurado, autoradas por IA (gen-historias.mjs). El modelo
# SÍ inventa (es el punto). 1×/día. El juego las flashea y usa de semilla del nivel (GET /historias); fallback estático.
historias:
  enabled: true
  schedule: "45 4 * * *"
  model: gemma4-paid
  per: 4

linyeraPool:
  cronjob:
    enabled: true
    schedule: "0 5 * * *"
    # gemma4-PAID (no gemma4-free): el free se cancela al pegar el límite de cuenta y arruinaba la generación.
    # Mismo modelo (google/gemma-4-31b-it), confiable, sin límite. Cuesta centavos (1×/día).
    model: gemma4-paid
    n: 30
  # genToken: <NO commitear — --set linyeraPool.genToken=...>

# el registry interno solo resuelve en nodos rk1
nodeSelector:
  kubernetes.io/hostname: srv-rk1-nvme-01
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
# fsGroup para que el uid 1000 pueda ESCRIBIR el PVC del store (subs.json) de Longhorn
podSecurityContext:
  fsGroup: 1000
