# Valores del chart del proxy de IA de Tormenta Solar. Defaults apuntados a un LiteLLM in-cluster.
replicaCount: 1

image:
  repository: ghcr.io/villadalmine/tormenta-ai-proxy
  tag: ""                 # vacío = usa Chart.appVersion
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# --- Upstream LLM (a dónde manda los pedidos el proxy) ---
# Por defecto: tu LiteLLM in-cluster, que YA hace pool de keys / GPU / fallback.
# OpenRouter directo: baseUrl "https://openrouter.ai/api/v1" y model "openrouter/...".
upstream:
  baseUrl: "http://litellm-proxy.ai.svc.cluster.local:4000/v1"
  model: "default"        # nombre que tu LiteLLM conoce: default | free | gpt-oss-free | local-gpu (Ollama GPU) | rk1-npu-local (NPU) | ...

# env extra arbitrario al pod del proxy (timeouts, cupo/día, presupuesto pago). Lista name/value.
# Ej.: - { name: DAILY_CAP, value: "40" }  - { name: PAID_DAILY_CAP, value: "600" }
extraEnv: []

# suscripción F3: provisioning key de OpenRouter (crea keys-por-código). Secret YA existente (no commitear).
provisioning:
  existingSecret: ""              # ej: tormenta-or-provisioning
  existingSecretKey: provisioningKey

# PVC para el store de suscripciones (código→key, JSON). Off por defecto.
persistence:
  enabled: false
  mountPath: /data
  storageClass: ""
  size: 1Gi

# CINE de noticias (specs/cine-noticias.md): cron que trae titulares por topic → banco /noticias.
noticias:
  enabled: false
  schedule: "0 9 * * *"     # 1×/día 9am
  timezone: "America/Argentina/Buenos_Aires"
  summarizeModel: ""        # "captura IA" del titular (fiel). Validado: gemma4-paid (GPU inventa, NPU caída). "" = titular crudo
  sports: ""                # opt-in fútbol/ligas: "mundial:4406,primera-b:4391" (TheSportsDB)
  worldcup: ""              # opt-in Mundial: "fifa.world" → tabla del grupo de Argentina + goleadores (ESPN)
  live: false               # cron horario live-only (Mundial/fútbol/crypto con merge)
  liveSchedule: "0 * * * *"

propaganda:                 # carteles FALSOS del cine generados por IA (comida/ropa/electronica/bizarro)
  enabled: false
  schedule: "0 4 * * *"
  timezone: "America/Argentina/Buenos_Aires"
  model: gemma4-paid

chusmerio:                  # frases de chusmerío ambiente (NPCs vivos) generadas por IA
  enabled: false
  schedule: "30 4 * * *"
  timezone: "America/Argentina/Buenos_Aires"
  model: gemma4-paid

carteles:                   # C2: la IA del salón deja CARTELES en el Tablón (cupo 30%/piso). construccion-colaborativa.md
  enabled: false
  schedule: "15 */6 * * *"  # cada 6h (no satura: el server capa al 30% del piso)
  timezone: "America/Argentina/Buenos_Aires"
  model: gemma4-paid

historias:                  # banco VIVO de historias de terror del vecino por edificio clausurado (IA)
  enabled: false
  schedule: "45 4 * * *"
  timezone: "America/Argentina/Buenos_Aires"
  model: gemma4-paid
  per: 4

# --- API key del upstream (para LiteLLM = su master key, p.ej. sk-…) ---
# Opción A (recomendada): referenciar un Secret YA existente (no commitea la key).
# Opción B: poner apiKey acá → el chart crea el Secret (NO lo subas a git con la key real; usá --set).
auth:
  existingSecret: ""      # ej: "tormenta-ai-key"
  existingSecretKey: ""   # ej: "apiKey"
  apiKey: ""              # ej (solo --set): "sk-…"

service:
  type: ClusterIP
  port: 80                # expone 80 → contenedor 8788

# Gateway API (Cilium) — la forma EN QUE ESTE CLUSTER expone servicios (no Ingress). HTTPRoute al
# `cluster-gateway` EXISTENTE (misma VIP 192.168.178.200 que el resto: cruzdelsur, etc.). HAProxy
# hace SNI passthrough a esa VIP; cada hostname nuevo solo agrega un listener HTTPS al gateway.
# Para el deploy público: gateway.enabled + tls.enabled + ensureListener.enabled (create=false).
gateway:
  enabled: false
  host: llm-tormenta-solar.cybercirujas.club
  extraHosts: []
  name: cluster-gateway            # reusamos el gateway compartido (misma IP)
  namespace: gateway
  className: cilium
  create: false                    # false = reusar cluster-gateway (NO crear Gateway propio)
  lbip: ""                         # solo aplica si create=true
  tls:
    enabled: false                 # true → Certificate (cert-manager) + listener HTTPS
    secretName: ""                 # "" = <release>-tls
    issuer: letsencrypt-prod       # ClusterIssuer ya existente (probá staging primero si querés)
  # Agrega el listener HTTPS al cluster-gateway (que el chart no ownea) vía hook Job idempotente.
  ensureListener:
    enabled: false                 # poné true en el deploy público (create=false)
    name: ""                       # "" = <release>-https
    image: bitnami/kubectl:latest  # imagen con kubectl (mirroreá a tu registry si hace falta)

# Let's Encrypt (DNS-01 acme-dns). En ESTE cluster los issuers YA existen (los creó online-game),
# así que enabled=false y los reusamos. true solo si querés que el chart cree los ClusterIssuer.
letsencrypt:
  enabled: false
  email: you@example.com
  acmeDnsHost: https://auth.acme-dns.io
  acmeDnsSecret: acme-dns-account  # secret en ns cert-manager, key credentials.json

# Ingress opcional (NO usado en este cluster; quedó por compatibilidad genérica).
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []               # - host: tormenta-ai.example.com
                          #   paths: [{ path: /, pathType: Prefix }]
  tls: []                 # - { secretName: tormenta-ai-tls, hosts: [tormenta-ai.example.com] }

# --- Métricas (Prometheus + Grafana), mismo patrón que online-game ---
# El proxy ya expone /metrics (prometheus). Esto lo conecta al stack del cluster:
#  - serviceMonitor: que el Prometheus de `monitoring` scrapee el Service :80/metrics.
#  - grafanaDashboard: ConfigMap con el dashboard, auto-importado por el sidecar de Grafana.
metrics:
  serviceMonitor:
    enabled: false                       # poné true en el deploy (necesita el Prometheus Operator)
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    # Labels para que el Prometheus de kube-prometheus-stack lo seleccione
    # (serviceMonitorSelector.matchLabels.release == kube-prometheus-stack en este cluster).
    labels:
      release: kube-prometheus-stack
  grafanaDashboard:
    enabled: false                       # poné true → crea el ConfigMap del dashboard
    # El sidecar de Grafana importa todo ConfigMap con esta label = "1" (NAMESPACE=ALL en este cluster).
    label: grafana_dashboard
    labelValue: "1"

# --- Pool del linyera (fallback cuando el free se satura), regenerado por CronJob 1×/día ---
# El cron genera con gemma4-free (offline = gratis + mejor calidad; GPU/NPU descartados) y POSTea a /linyera-pool.
linyeraPool:
  genToken: ""                  # token compartido proxy<->cron (poné uno con --set; protege POST /linyera-pool)
  cronjob:
    enabled: false              # poné true en el deploy
    schedule: "0 5 * * *"       # 05:00 (de noche, off-peak del free)
    model: gemma4-free          # ganador del bench (specs/resiliencia.md §6.2)
    n: 30                       # frases por persona

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 250m, memory: 256Mi }

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podAnnotations: {}
podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000          # UID del user `node` en node:20-alpine (no-numérico USER node no verificable)
  runAsGroup: 1000
nodeSelector: {}
tolerations: []
affinity: {}
