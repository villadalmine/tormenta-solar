# Alertas del deploy + workflows (deploy-pipeline.md §3.1): "si falla algo me entero SIN mirar".
# La ruta de Alertmanager ya manda severity warning|critical → Telegram (receiver telegram-openclaw existente).
#
# NOTA de límites (regla del dueño 2026-07-03): acá vive SOLO lo del ns ai (dominio del juego). El Service +
# ServiceMonitor del workflow-controller (ns argo = infra del cluster) se movió al repo infra:
# infra/roles/install-argo-workflows/files/controller-metrics.yaml (aplicado a mano 2026-07-03; el role lo gestiona).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tormenta-deploy
  namespace: ai
  labels:
    release: kube-prometheus-stack        # lo que exige el ruleSelector del stack
spec:
  groups:
    - name: tormenta-ia
      # IA/COSTOS (specs/ia-costos.md): el cron ia-health (6h) publica gauges → estas reglas → Telegram.
      rules:
        - alert: TormentaIAFallbackAlto
          expr: tormenta_ia_health_fallback_pct >= 20 and tormenta_ia_health_fallback_pct < 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: '🤖⚠️ IA del juego: {{ $value }}% de fallback en la última ventana'
            description: 'Los NPC están cayendo a las líneas locales. Revisar la cadena de modelos (specs/ia-costos.md §1). Reportes: https://llm-tormenta-solar.cybercirujas.club/ia-reports'
        - alert: TormentaIAFallbackCritico
          expr: tormenta_ia_health_fallback_pct >= 50
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: '🤖🚨 IA del juego CAÍDA: {{ $value }}% de fallback'
            description: 'La mayoría de los chats está fallando. Ver https://llm-tormenta-solar.cybercirujas.club/ia-reports y las cadenas en ai-proxy/chart/values-prod.yaml'
        - alert: TormentaIABudgetAlto
          expr: tormenta_ia_health_paid_used_pct >= 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: '💸 IA del juego: budget pago al {{ $value }}% del tope diario'
            description: 'Se está por agotar PAID_DAILY_CAP (al agotarse los anónimos caen a fallback). Subir el cap o abaratar la cadena. https://llm-tormenta-solar.cybercirujas.club/ia-reports'
        - alert: TormentaIACadenaCambiada
          expr: (time() - tormenta_ia_tune_last_change_ts / 1000) < 3600 and tormenta_ia_tune_last_change_ts > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: 'ℹ️🤖 El AUTOTUNE cambió la cadena de chat (verificada punta a punta)'
            description: 'Cadena efectiva + motivo: https://llm-tormenta-solar.cybercirujas.club/ia-chain · Historial: /ia-reports (kind tune). Si algo anda mal, el health de 6h revierte solo; para forzar baseline: POST /ia-chain {reset:true}.'
        # VIGÍA DE GASTO de la cuenta OpenRouter ENTERA (infra-76): el health de 6h llama /or-spend en el proxy
        # (provisioning key) → delta por key → gauge US$/día. Cubre TODAS las apps (galaxy/hermes/openclaw/
        # holmes/leloir + el juego). Pedido del dueño 2026-07-20: "se me va mucha plata por día".
        - alert: TormentaGastoCuentaAlto
          expr: tormenta_or_day_est_usd >= 3 and tormenta_or_day_est_usd < 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: '💳⚠️ La cuenta OpenRouter ENTERA va a ~US${{ $value }}/día (≈US$90+/mes)'
            description: 'Gasto de TODAS las apps juntas (galaxy, hermes, openclaw, holmes, leloir y el juego), no solo Tormenta. Desglose por key: https://llm-tormenta-solar.cybercirujas.club/ia-reports (health → day.cuentaOrTop) · dashboard: https://openrouter.ai/activity'
        - alert: TormentaGastoCuentaCritico
          expr: tormenta_or_day_est_usd >= 10
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: '💳🚨 La cuenta OpenRouter va a ~US${{ $value }}/día — algo se descontroló'
            description: 'Más de US$10/día = US$300+/mes. Mirar YA qué key dispara: https://llm-tormenta-solar.cybercirujas.club/ia-reports (health → day.cuentaOrTop) · https://openrouter.ai/activity · Sospechosos típicos: ticks de galaxy, agentes en loop (hermes/openclaw/holmes), Honcho procesando backlog.'
        - alert: TormentaIAHealthViejo
          expr: (time() - tormenta_ia_health_ts / 1000) > 28800
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: '🩺 El cron ia-health no reporta hace >8h'
            description: 'El CronWorkflow tormenta-ai-proxy-ia-health no está corriendo/reportando. kubectl -n ai get cronworkflow'
    - name: tormenta-deploy
      rules:
        - alert: TormentaDeployFailed
          expr: max by (component) (tormenta_deploy_failed) == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: '🚨 Deploy de TORMENTA «{{ $labels.component }}» FALLÓ (rollback automático hecho)'
            description: 'El último deploy de {{ $labels.component }} falló la verificación y el workflow hizo rollback a la revisión anterior. Historial: https://llm-tormenta-solar.cybercirujas.club/deploy-log · Detalle: kubectl -n ai get wf | grep tormenta-deploy'
        - alert: TormentaAutoplayFailed
          expr: tormenta_qa_failed == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: '🤖🚨 El Autoplay QA encontró el juego ROTO en prod'
            description: 'La corrida nocturna del bot falló. Veredicto + PROMPT DE AUTO-FIX listo: https://llm-tormenta-solar.cybercirujas.club/qa/reporte'
        - alert: ArgoWorkflowsFallados
          expr: sum(argo_workflows_gauge{phase=~"Failed|Error"}) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: '⚠️ Hay {{ $value }} workflow(s) de Argo FALLADOS en el cluster'
            description: 'Crones/builds/deploys que fallaron y quedaron tirados (ej. el cron de carteles colgado). Ver: kubectl get wf -A | grep -iE "fail|error"'
