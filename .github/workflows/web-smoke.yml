name: tests

# Corre en cada push / PR. El job de "web smoke" abre el juego en un Chromium real
# (cosa que el entorno de dev local no tiene) y verifica render + layout + consola.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1) e2e headless (lógica + auditoría de assets + boot v2), sin navegador
      - name: e2e headless
        run: node tests/e2e.js

      # 1a) circuit breaker del chat + señal de salud compartida (resiliencia GPU)
      - name: circuit breaker (resiliencia)
        run: node tests/breaker.js

      # 1b) modelo v2 data-driven: schema válido + paridad v1≡v2 + JUGABILIDAD (la red de la máquina de niveles)
      - name: modelo v2 (schema + paridad + jugabilidad)
        run: |
          node tests/levels.mjs
          node tests/parity.mjs
          node tests/playable.mjs

      # 2) smoke de navegador real (Playwright + Chromium)
      - name: instalar tooling
        run: npm install

      - name: instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: web smoke (navegador real)
        run: node tests/web-smoke.mjs

      - name: subir screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tests/screenshots/
          if-no-files-found: ignore
